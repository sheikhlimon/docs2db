name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - run: uv sync

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Pyright
        run: uv run pyright src/docs2db/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67 # pg17
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_docs2db
        options: >-
          --health-cmd "pg_isready -U test_user -d test_docs2db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DB_HOST: localhost
      TEST_DB_PORT: "5433"
      TEST_DB_NAME: test_docs2db
      TEST_DB_USER: test_user
      TEST_DB_PASSWORD: test_password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - run: uv sync

      - name: Run tests
        run: make test-ci
